<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search Posts</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<!-- Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="css/global.css" rel="stylesheet">
  
<style>

/* Search Box */
.search-box {
  max-width:420px; width: 80%;
  margin:auto; position:relative;
}

.search-box input {
  border-radius:30px;
  padding-left:40px;
}

.search-box i {
  position:absolute;
  left:12px;
  top:50%;
  transform:translateY(-50%);
  color:#999;
}

/* Cards */
.card-custom {
  background: var(--card);
  border:1px solid var(--border); border-radius:12px;
  overflow:hidden; transition:.3s;
}

.card-img {
  height:180px;
  background:#ddd;
}

/* Empty */
.empty-state {
  text-align:center;
  padding:60px;
  color:#777;
}
</style>
</head>

<body>

<!-- HEADER -->
<header class="header-section">
  <button class="back-btn me-3" role="button" aria-label="Go back" onclick="window.history.back();">
    <i class="bi bi-arrow-left"></i>
  </button>
  <div class="search-box">
    <i class="bi bi-search"></i>
    <input type="text" id="searchInput" class="form-control" placeholder="Search posts...">
  </div>
</header>

<!-- 📦 Content -->
<main class="container mt-4">
  <div class="row" id="results"></div>
</main>

<script>

let allPosts = [];

// Fetch data
fetch("data/stories.json")
.then(res => res.json())
.then(data => {
  allPosts = data;

  // Show all initially
  displayPosts(allPosts);
})
.catch(() => {
  document.getElementById("results").innerHTML = `
    <div class="empty-state">
      <h4>Error Loading Posts</h4>
    </div>`;
});

// Display function
function displayPosts(posts){
  const container = document.getElementById("results");
  container.innerHTML = "";

  if(posts.length === 0){
    container.innerHTML = `
      <div class="empty-state">
        <h4>No Results Found</h4>
        <p>Try different keywords</p>
      </div>`;
    return;
  }

  posts.forEach(post => {

    const date = new Date(post.date).toLocaleDateString("en-IN", {
      day:"numeric",
      month:"short",
      year:"numeric"
    });

    container.innerHTML += `
    <div class="col-md-4 mb-4">
      <div class="card-custom">
        <div class="card-img" style="background:url('${post.image}') center/cover;"></div>
        <div class="p-3">
          <small class="text-muted">${date}</small>
          <h5>${post.title}</h5>
          <p class="text-muted">${post.description}</p>
          <a href="${post.link}" class="btn btn-outline-primary btn-sm">Read Now →</a>
        </div>
      </div>
    </div>
    `;
  });
}

// 🔥 Realtime Search
document.getElementById("searchInput").addEventListener("input", function(){

  const value = this.value.toLowerCase();

  const filtered = allPosts.filter(post =>
    post.title.toLowerCase().includes(value) ||
    post.description.toLowerCase().includes(value)
  );

  displayPosts(filtered);

});

</script>

</body>
</html>
