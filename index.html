<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,shrink-to-fit=no,viewport-fit=cover">
<title> QMath Dashboard </title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<!-- Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<!-- Linked My butterfly.css file -->
<link href="css/butterfly.css" rel="stylesheet">

</head>

<body>

<!-- 🔝 Topbar -->
<header class="topbar">
  <button class="btn btn-light d-lg-none" data-bs-toggle="offcanvas" data-bs-target="#mobileSidebar">
    <i class="bi bi-list"></i>
  </button>

  <h6 class="ms-3 mb-0">Total Posts: <span id="totalPosts">0</span></h6>

  <div class="ms-auto">
    <i class="bi bi-envelope me-3"></i>
    <i class="bi bi-person-circle fs-4"></i>
  </div>
</header>

<!-- 🖥 Desktop Sidebar -->
<aside class="sidebar d-none d-lg-block">
  <h5 class="mb-4">MEASURE</h5>

  <ul class="nav flex-column">
    <li class="nav-item mb-2">
      <a href="#" class="nav-link d-flex justify-content-between align-items-center">
        Jobs <span class="badge bg-dark">3</span>
      </a>
    </li>
    <li class="nav-item">
      <a href="#" class="nav-link">Wallet</a>
    </li>
  </ul>

  <p class="text-muted mt-4">How do we use your activity?</p>
</aside>

<!-- 📱 Mobile Offcanvas Sidebar -->
<div class="offcanvas offcanvas-start" tabindex="-1" id="mobileSidebar">

  <div class="offcanvas-header">
    <h5 class="offcanvas-title">MEASURE</h5>
    <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
  </div>

  <div class="offcanvas-body">

    <ul class="nav flex-column">
      <li class="nav-item mb-3">
        <a href="#" class="nav-link d-flex justify-content-between align-items-center">
          Jobs <span class="badge bg-dark">3</span>
        </a>
      </li>

      <li class="nav-item mb-3">
        <a href="#" class="nav-link">Wallet</a>
      </li>
    </ul>

    <p class="text-muted mt-4">How do we use your activity?</p>

  </div>
</div>

<!-- 📦 Content -->
<main class="content">
  <div class="row" id="postsContainer">

    <!-- Skeleton -->
    <script>
      for(let i=0;i<6;i++){
        document.write(`
        <div class="col-md-4 mb-4">
          <div class="card-custom p-3">
            <div class="skeleton skeleton-box"></div>
            <div class="skeleton skeleton-text w-75"></div>
            <div class="skeleton skeleton-text w-100"></div>
            <div class="skeleton skeleton-text w-50"></div>
          </div>
        </div>
        `);
      }
    </script>

  </div>
</main>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>

// Fetch posts
fetch("data/tories.json")
.then(res => res.json())
.then(data => {

  const container = document.getElementById("postsContainer");
  container.innerHTML = "";

  if(!data || data.length === 0){
    container.innerHTML = `
      <div class="empty-state">
        <h4>No Posts Found</h4>
        <p>Please add stories.json data</p>
      </div>`;
    return;
  }

  document.getElementById("totalPosts").innerText = data.length;

  data.forEach(post => {
    container.innerHTML += `
    <div class="col-md-4 mb-4">
      <div class="card-custom">
        <div class="card-img" style="background:url('${post.image}') center/cover;"></div>
        <div class="p-3">
          <h5>${post.title}</h5>
          <p class="text-muted">${post.description}</p>
          <a href="${post.link}" class="btn btn-outline-primary btn-sm">Read Now →</a>
        </div>
      </div>
    </div>
    `;
  });

})
.catch(() => {
  document.getElementById("postsContainer").innerHTML = `
    <div class="empty-state">
      <img src="assets/browser.png" class="error-img" loading="lazy" draggable="false" alt="Girl in a jacket" width="80" height="80">
      <h4> Error Loading Data </h4>
      <p> please try again sometimes leter. </p>
    </div>`;
});

</script>

</body>
</html>
