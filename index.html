<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,shrink-to-fit=no,viewport-fit=cover">
<title> QMath Dashboard </title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<!-- Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<!-- Linked My butterfly.css file -->
<link href="css/butterfly.css" rel="stylesheet">
<!-- Linked My global.css file -->
<link href="css/global.css" rel="stylesheet">
<script src="control_center/version-check.js" defer> </script>

</head>

<body>

<!-- 🔝 Topbar -->
<header class="topbar">
  <button class="btn d-lg-none" data-bs-toggle="offcanvas" data-bs-target="#mobileSidebar">
    <i class="bi bi-list"></i>
  </button>

  <h6 class="me-2 mb-0">Total Posts: <span id="totalPosts">0</span></h6>

  <div class="ms-auto header-icon">
    <a onclick="window.location.href='notifications/notifications.html';" class="bi bi-bell me-2"></a>
    <a onclick="window.location.href='search.html';" class="bi bi-search"></a>
  </div>
</header>

<!-----------------------------------------------------------------
  ----------------------- 🖥 Desktop Sidebar ----------------------
  ----------------------------------------------------------------->
<aside class="sidebar d-none d-lg-block">
  <h5 class="mb-4"> KYRA Apps </h5>

  <ul class="nav flex-column">
    <li class="nav-item mb-3"> <a onclick="window.location.href='#';" class="nav-link"> <i class="bi bi-briefcase me-2"></i> Wallet </a> </li>
    <li class="nav-item mb-3"> <a onclick="window.location.href='#';" class="nav-link"> <i class="bi bi-wallet2 me-2"></i> Wallet </a> </li>
  </ul>

  <p class="text-muted mt-4">How do we use your activity?</p>
</aside>

<!-----------------------------------------------------------------
  -----------------📱 Mobile Offcanvas Sidebar --------------------
  ----------------------------------------------------------------->
<div class="offcanvas offcanvas-start" tabindex="-1" id="mobileSidebar">

  <div class="offcanvas-header">
    <h5 class="offcanvas-title"> KYRA Apps </h5>
    <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
  </div>

  <div class="offcanvas-body">

    <ul class="nav flex-column">
      <li class="nav-item mb-3"> <a onclick="window.location.href='#';" class="nav-link"> <i class="bi bi-briefcase me-2"></i> Wallet </a> </li>
      <li class="nav-item mb-3"> <a onclick="window.location.href='#';" class="nav-link"> <i class="bi bi-wallet2 me-2"></i> Wallet </a> </li>
    </ul>

    <p class="text-muted mt-4">How do we use your activity?</p>

  </div>
</div>

<!-- 📦 Content -->
<main class="content">
  <div class="row" id="postsContainer">

    <!-- Skeleton -->
    <script>
      for(let i=0;i<6;i++){
        document.write(`
        <div class="col-12 col-md-6 col-lg-4 mb-4">
          <div class="card-custom p-3">
            <div class="skeleton skeleton-box"></div>
            <div class="skeleton skeleton-text w-75"></div>
            <div class="skeleton skeleton-text w-100"></div>
            <div class="skeleton skeleton-text w-50"></div>
          </div>
        </div>
        `);
      }
    </script>

  </div>
</main>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>

// Fetch posts
fetch("data/stories.json")
.then(res => res.json())
.then(data => {

  const container = document.getElementById("postsContainer");
  container.innerHTML = "";

  if(!data || data.length === 0){
    container.innerHTML = `
      <div class="empty-state">
        <h4>No Posts Found</h4>
        <p>Please add stories.json data</p>
      </div>`;
    return;
  }

  // 🔥 Sort latest first
  data.sort((a,b) => new Date(b.date) - new Date(a.date));
  function timeAgo(date){
  const diff = (new Date() - new Date(date)) / 1000;
  const days = Math.floor(diff / 86400);

  if(days < 1) return "Today";
  if(days === 1) return "Yesterday";
  return days + " days ago";
}

  document.getElementById("totalPosts").innerText = data.length;

  data.forEach(post => {

    const formattedDate = new Date(post.date).toLocaleDateString("en-IN", {
      day: "numeric",
      month: "short",
      year: "numeric"
    });

    container.innerHTML += `
    <div class="col-12 col-md-6 col-lg-4 mb-4">
      <div class="card-custom">
        <div class="card-img" style="background:url('${post.image}') center/cover;"></div>
        <div class="p-3">
          <h5 class="mt-1">${post.title}</h5>
          <p class="text-muted">${post.description}</p>
          <div class="d-flex justify-content-between align-items-center mt-3">
            <a href="${post.link}" class="btn btn-sm"> Read Now </a>
            <small class="text-muted">${timeAgo(post.date)}</small>
          </div>
        </div>
      </div>
    </div>
    `;
  });

})////////////////////////////////////////////////////////////
.catch(() => {
  document.getElementById("postsContainer").innerHTML = `
    <div class="empty-state">
      <img src="assets/browser.png" class="error-img" loading="lazy" draggable="false" alt="Girl in a jacket" width="80" height="80">
      <h4> Error Loading Data </h4>
      <p> please try again sometimes leter. </p>
    </div>`;
});

</script>

</body>
</html>
