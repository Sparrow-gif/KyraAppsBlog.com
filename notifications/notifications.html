<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title> QMath - Notifications </title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<!-- Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="../control_center/version-check.js" defer> </script>
<link rel="stylesheet" href="../css/global.css">
  
<style>

/* ================= ROOT COLORS ================= */
:root {
  --muted: #6c757d;
  --popup: #ffffff;
  --popup-text: #000;
}

/* ================= DARK MODE ================= */
@media (prefers-color-scheme: dark) {
  :root {
    --muted: #9aa0a6;
    --popup: #22252b;
    --popup-text: #f1f3f5;
  }
}

/* ================= HEADER ================= */


/* ================= DATE ================= */
.date-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--muted);
  margin: 18px 0 10px;
}

/* ================= CARD ================= */
.notification-card {
  border: 1px solid var(--border);
  border-radius: 12px;
  background: var(--card);
  padding: 10px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: 0.25s ease;
}

.notification-card:hover {
  transform: scale(0.98);
  box-shadow: 0 0 10px rgba(255,255,255,0.05);
}

.notification-logo {
  width: 48px;
  height: 48px;
  border-radius: 10px;
  object-fit: cover;
  background: var(--header);
}

/* TEXT */
.not-title {
  color: var(--text);
  font-weight: 600;
  font-size: 15px;
}

.not-time {
  color: var(--muted);
  font-size: 12px;
}

/* ================= NO DATA ================= */
.no-data {
  text-align: center;
  margin-top: 120px;
}

.no-data i {
  font-size: 60px;
  color: var(--muted);
}

/* ================= POPUP ================= */
.popup {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  justify-content: center;
  align-items: center;
  z-index: 999;
}

.popup-content {
  background: var(--popup);
  padding: 25px;
  border-radius: 14px;
  width: 90%;
  max-width: 380px;
  text-align: center;
  transform: scale(0.7);
  opacity: 0;
  transition: 0.3s;
}

.popup.show .popup-content {
  transform: scale(1);
  opacity: 1;
}

.popup h5, .popup p {
  color: var(--popup-text);
}
</style>
</head>

<body>

<!-- HEADER -->
<header class="header-section">
  <button class="back-btn" role="button" aria-label="Go back" onclick="window.history.back();">
    <i class="bi bi-arrow-left"></i>
  </button>
  <div class="title"> notification </div>
</header>

<!-- MAIN -->
<main class="container py-3">
  <section id="notificationsContainer"></section>
</main>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="popup-content shadow">
    <h5 id="popupTitle"></h5>
    <p id="popupContent"></p>
    <button class="btn btn-primary btn-sm mt-2" onclick="closePopup()">Close</button>
  </div>
</div>

<!-- JS -->
<script>
let lastData = "";

/* Fetch Notifications */
async function fetchNotifications() {
  try {
    const res = await fetch("notifications.json");
    const data = await res.json();

    const newData = JSON.stringify(data);
    if (newData === lastData) return; // avoid re-render
    lastData = newData;

    const container = document.getElementById("notificationsContainer");
    container.innerHTML = "";

    if (Object.keys(data).length === 0) {
      container.innerHTML = `
        <div class="no-data">
          <i class="bi bi-bell-slash"></i>
          <h5>No Notifications</h5>
          <p>Nothing to show right now</p>
        </div>`;
      return;
    }

    for (const date in data) {
      const dateDiv = document.createElement("div");
      dateDiv.className = "date-title";
      dateDiv.textContent = date;
      container.appendChild(dateDiv);

      data[date].forEach(noti => {
        const card = document.createElement("article");
        card.className = "notification-card";

        card.innerHTML = `
          <div class="d-flex align-items-center">
            <img src="../assets/splash.png" class="notification-logo me-3" draggable="false">
            <div>
              <div class="not-title">${noti.title}</div>
              <div class="not-time">${noti.time}</div>
            </div>
          </div>
        `;

        card.onclick = () => showPopup(noti.title, noti.content);
        container.appendChild(card);
      });
    }

  } catch (err) {
    console.error(err);
  }
}

/* Popup */
function showPopup(title, content) {
  const popup = document.getElementById("popup");
  document.getElementById("popupTitle").innerText = title;
  document.getElementById("popupContent").innerText = content;

  popup.style.display = "flex";
  setTimeout(() => popup.classList.add("show"), 10);
}

function closePopup() {
  const popup = document.getElementById("popup");
  popup.classList.remove("show");
  setTimeout(() => popup.style.display = "none", 300);
}

/* Optimized Interval (5 sec) */
setInterval(fetchNotifications, 5000);
fetchNotifications();
</script>

</body>
</html>
