<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,shrink-to-fit=no,viewport-fit=cover">

  <title>  </title>
  <!-- SEO -->
  <meta name="description" content="Dynamic blog post page">

  <!-- Bootstrap + Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  
  <!-- Custom CSS -->
  <link href="../css/flower.css" rel="stylesheet">
  <link href="../css/global.css" rel="stylesheet">
  <script src="../control_center/version-check.js"> </script>
    
</head>

<body>

  <!-- Header -->
  <div id="header"></div>

  <!-- Main -->
  <main class="container py-5">

    <div class="row">

      <!-- 🔥 Main Content -->
      <div class="col-lg-8">

        <h1 id="post-title"></h1>

        <div class="text-muted mb-3">
          <span id="post-author"></span> | 
          <span id="post-date"></span>
        </div>

        <!---- 🔥 Social Share ---->
        <div id="social-share"></div>
        
        <img id="post-image" class="feature-img" loading="lazy">

        <!-- Optional Tags -->
        <!-- <div id="post-tags" class="mb-3"></div> -->

        <article>
          <p>Manual content yaha rahega...</p>
        </article>

      </div>

      <!-- 🔥 Sidebar -->
      <div class="col-lg-4">

        <!-- Sidebar components -->
        <div id="sidebar"></div>

      </div>

    </div>

  </main>

  <!-- Footer -->
  <div id="footer"></div>

  <!-- JS -->
  <script src="../JS/social-share.js"></script>
  <script src="../JS/main.js"></script>
  

</body>
</html>
