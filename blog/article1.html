<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Loading...</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

  <!-- Header Load -->
  <div id="header"></div>

<main class="container py-5">

  <!-- Dynamic Data -->
  <h1 id="post-title"></h1>

  <div class="d-flex gap-3 text-muted mb-3">
    <span id="post-author"></span>
    <span id="post-date"></span>
  </div>

  <img id="post-image" class="img-fluid rounded mb-4" />

  <!-- Manual Content -->
  <article>
    <p>Yaha tum apna manually likha hua content daaloge...</p>
  </article>

</main>

<!-- Footer Load -->
<div id="footer"></div>

<script>
/* 🔥 Load Header */
fetch("../components/header.html")
  .then(res => res.text())
  .then(data => document.getElementById("header").innerHTML = data);

/* 🔥 Load Footer */
fetch("../components/footer.html")
  .then(res => res.text())
  .then(data => document.getElementById("footer").innerHTML = data);

/* 🔥 JSON Post Data */
const currentPage = window.location.pathname.split("/").pop();

fetch("../data/stories.json")
  .then(res => res.json())
  .then(data => {

    const post = data.find(item => item.link.includes(currentPage));
    const date = new Date(post.date).toDateString();
    document.getElementById("post-date").innerText = date;
    
    if(post){

      document.getElementById("post-title").innerText = post.title;
      document.getElementById("post-author").innerText = "By " + post.author;
      document.getElementById("post-date").innerText = post.date;
      document.getElementById("post-image").src = post.image;

      document.title = post.title;

    } else {
      document.body.innerHTML = "<h2>Post not found</h2>";
    }

  });
</script>

</body>
</html>
