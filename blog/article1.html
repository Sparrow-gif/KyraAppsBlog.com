<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,shrink-to-fit=no,viewport-fit=cover">

  <title>  </title>
  <!-- SEO -->
  <meta name="description" content="Dynamic blog post page">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <!-- Custom CSS -->
  <link href="../css/flower.css" rel="stylesheet">
  <link href="../css/global.css" rel="stylesheet">
  <script src="../control_center/version-check.js" defer> </script>

  <style>
    /* 🔥 Related Post Hover */
    #related-posts a {
      display: block;
      transition: 0.3s;
    }
    #related-posts a:hover {
      transform: translateX(5px);
    }
  </style>
    
</head>

<body>

  <!-- Header -->
  <div id="header"></div>

  <!-- Main -->
  <main class="container py-5">

    <div class="row">

      <!-- 🔥 Main Content -->
      <div class="col-lg-8">

        <h1 id="post-title"></h1>

        <div class="text-muted mb-3">
          <span id="post-author"></span> | 
          <span id="post-date"></span>
        </div>

        <img id="post-image" class="img-fluid mb-4 rounded" loading="lazy">

        <!-- Optional Tags -->
        <div id="post-tags" class="mb-3"></div>

        <article>
          <p>Manual content yaha rahega...</p>
        </article>

      </div>

      <!-- 🔥 Sidebar -->
      <div class="col-lg-4">

        <!-- Sidebar components -->
        <div id="sidebar"></div>

        <!-- Related Posts -->
        <div class="mt-4">
          <h5 class="mb-3">Related Posts</h5>
          <div id="related-posts"></div>
        </div>

      </div>

    </div>

  </main>

  <!-- Footer -->
  <div id="footer"></div>

  <!-- JS -->
  <script>

  const currentPage = window.location.pathname.split("/").pop();

  /* 🔥 Load Header */
  fetch("../components/header.html")
    .then(res => res.text())
    .then(data => document.getElementById("header").innerHTML = data);

  /* 🔥 Load Footer */
  fetch("../components/footer.html")
    .then(res => res.text())
    .then(data => document.getElementById("footer").innerHTML = data);

  /* 🔥 Load Sidebar */
  fetch("../components/sidebar.html")
    .then(res => res.text())
    .then(data => {
      document.getElementById("sidebar").innerHTML = data;
      loadPostData();
    });

  function loadPostData(){

    fetch("../data/stories.json")
      .then(res => res.json())
      .then(data => {

        const post = data.find(item => item.link.includes(currentPage));

        if(!post){
          document.body.innerHTML = "<h2 class='text-center mt-5'>Post not found</h2>";
          return;
        }

        // ✅ Format Date
        const formattedDate = new Date(post.date).toDateString();

        // ✅ Main Post
        document.getElementById("post-title").innerText = post.title;
        document.getElementById("post-author").innerText = "By " + post.author;
        document.getElementById("post-date").innerText = formattedDate;

        const img = document.getElementById("post-image");
        img.src = post.image;
        img.alt = post.title;

        document.title = post.title;

        // ✅ Tags
        if(post.tags && document.getElementById("post-tags")){
          const tagHTML = post.tags.map(tag =>
            `<span class="badge bg-primary me-1">${tag}</span>`
          ).join("");

          document.getElementById("post-tags").innerHTML = tagHTML;
        }

        // 🔥 RELATED POSTS
        let related = data.filter(item => {
          if(item.link.includes(currentPage)) return false;
          return item.tags?.some(tag => post.tags?.includes(tag));
        });

        // 🔥 Sort Latest
        related.sort((a, b) => new Date(b.date) - new Date(a.date));

        // 🔥 Fallback
        if(related.length === 0){
          related = data.filter(item => !item.link.includes(currentPage));
        }

        const topRelated = related.slice(0, 5);

        let html = "";

        topRelated.forEach(item => {

          const date = new Date(item.date).toDateString();

          html += `
            <a href="../${item.link}" class="text-decoration-none text-dark">
              <div class="d-flex mb-3 align-items-center">
                <img src="${item.image}" width="80" height="60" 
                     alt="${item.title}"
                     loading="lazy"
                     class="rounded me-2" style="object-fit:cover;">
                <div>
                  <h6 class="mb-1">${item.title}</h6>
                  <small class="text-muted">${date}</small>
                </div>
              </div>
            </a>
          `;
        });

        document.getElementById("related-posts").innerHTML = html;

      })
      .catch(err => {
        console.error("Error:", err);
        document.body.innerHTML = "<h2 class='text-center mt-5'>Something went wrong</h2>";
      });
  }

  </script>

</body>
</html>
